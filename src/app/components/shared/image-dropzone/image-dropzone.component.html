<div class="dropzone-field">
  <label class="form-label" *ngIf="label">{{ label }}</label>

  <div
    class="dropzone"
    [class.dragging]="isDragging"
    [class.has-images]="images.length > 0"
    (dragover)="onDragOver($event)"
    (dragleave)="onDragLeave($event)"
    (drop)="onDrop($event)"
    (click)="!images.length && fileInput.click()"
  >
    <input
      #fileInput
      type="file"
      accept="image/*"
      [multiple]="multiple"
      hidden
      (change)="onFileSelect($event)"
    />

    <div class="dropzone-content" *ngIf="!images.length; else previewTpl">
      <i class="fa fa-cloud-upload"></i>
      <p class="title">اسحب الصور هنا</p>
      <p class="hint">يمكن اختيار أكثر من صورة — أو اضغط للاختيار من الجهاز</p>
    </div>

    <ng-template #previewTpl>
      <div class="preview-grid">
        <div class="preview-item" *ngFor="let img of images; let i = index">
          <img [src]="img" alt="preview" />
          <button type="button" class="remove-btn" (click)="removeImage(i); $event.stopPropagation()" title="حذف">
            &times;
          </button>
        </div>

        <button
          type="button"
          class="add-more"
          *ngIf="multiple && images.length < maxFiles"
          (click)="fileInput.click(); $event.stopPropagation()"
        >
          <i class="fa fa-plus"></i>
          <span>إضافة</span>
        </button>
      </div>

      <p class="count-hint">{{ images.length }} / {{ maxFiles }} صور</p>
    </ng-template>
  </div>

  <p class="error" *ngIf="errorMessage">{{ errorMessage }}</p>
</div>
